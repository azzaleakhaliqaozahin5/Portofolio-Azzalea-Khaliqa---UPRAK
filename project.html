<!DOCTYPE html>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

/* ===== BACKGROUND ===== */
.main-bg {
    min-height: 100vh;
    background: url("Jean's.jpg") center / cover no-repeat;
}

@media (min-width: 768px) {
    .main-bg {
        background-attachment: fixed;
    }
}

/* ===== HERO ===== */
.hero-header {
    width: 100%;
    min-height: 100vh;
    background: url("Project 50s.jpg") center / cover no-repeat;
}

/* ===== NAVBAR ===== */
nav {
    width: 100%;
    text-align: center;
    padding: 15px 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 20px;
    text-decoration: none;
    font-weight: bold;
    position: relative;
}

nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0%;
    height: 2px;
    background: white;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

/* ===== CONTAINER ===== */
.container {
    width: 90%;
    max-width: 1200px;
    margin: 40px auto;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

/* ===== TEXT ===== */
.container h2 {
    text-align: center;
    margin-bottom: 10px;
}

.container p {
    text-align: center;
    color: rgba(255,255,255,0.8);
}

/* ===== PROJECT GRID ===== */
.project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    margin-top: 30px;
}

/* ===== CARD ===== */
.project-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    overflow: hidden;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
}

.project-card:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

.project-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

    .project-card iframe {
    width: 100%;
    height: 180px;
    border: none;
    display: block;
}
    
.project-card a {
    display: block;
    padding: 15px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    text-align: center;
}

.project-card a:hover {
    background: rgba(255,255,255,0.1);
}

/* ===== FOOTER ===== */
footer {
    text-align: center;
    padding: 10px;
    color: #aaa;
}
</style>
</head>
